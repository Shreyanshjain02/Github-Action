name: WF_Matrix

on:
  workflow_dispatch:
    


jobs:
    JB_Matrix:
        runs-on: ubuntu-latest
        strategy:
          matrix:
            python-version: [3.10,3.11,3.12,3.13,3.14]

        steps:
          - name: Install python
            run: sudo apt-get update && apt install python${{matrix.python-version}}
          - name: check version
            run: python --version
    
    JB_Code:
        runs-on: ubuntu-latest
        steps:
          - name: running small python code
            run: python --version


