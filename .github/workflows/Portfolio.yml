name: sj_portfolio

on:
  workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write


jobs:
    portfolio_deploy:
        runs-on: ubuntu-latest

        environment: 
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            # we are using github action automated steps

            # First: we checkout our code into github
            - name: checkout code
              uses: actions/checkout@v6
           
            # Second: we build and configure pages
            - name: setup pages
              uses: actions/configure-pages@v6
            
            # Third: We are creating static artifacts or file
            - name: upload static
              uses: actions/upload-pages-artifact@v6
              with:
                path: '.'

            # Fourth: Deploy everything and see magic
            - name: deployment
              uses: actions/deploy-pages@v6

